kind = "web"
previewPath = "/"
title = "Crestfield Bank"
version = "1.0.0"
id = "artifacts/sterling-crest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20415

[services.development]
run = "pnpm --filter @workspace/sterling-crest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sterling-crest", "run", "build" ]
publicDir = "artifacts/sterling-crest/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20415"
BASE_PATH = "/"
